<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow login-card">

    <h3 class="text-center">Register</h3>

    <form id="registerForm">
      <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>

      <input type="email" class="form-control mb-2" placeholder="Email" required>

      <input type="password" id="pass1" class="form-control mb-2" placeholder="Password" required>
      <input type="password" id="pass2" class="form-control mb-2" placeholder="Confirm Password" required>

      <p id="msg" class="text-danger"></p>

      <button class="btn btn-success w-100">Register</button>
    </form>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
