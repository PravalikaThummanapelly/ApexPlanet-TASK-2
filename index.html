<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">MyApp</span>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow login-card">

    <h3 class="text-center mb-3">Login</h3>

    <form id="loginForm">
      <input type="email" class="form-control mb-3" placeholder="Email" required>

      <div class="input-group mb-3">
        <input type="password" id="loginPass" class="form-control" placeholder="Password" required>
        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPass')">👁</button>
      </div>

      <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
